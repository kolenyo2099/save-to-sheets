<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Google Sans, Roboto, Arial, sans-serif;
      width: 280px;
      padding: 20px;
      color: #202124;
    }
    .logo { font-size: 32px; text-align: center; margin-bottom: 8px; }
    h1 { font-size: 16px; font-weight: 600; text-align: center; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #5f6368; text-align: center; margin-bottom: 20px; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .status-ok    { background: #e6f4ea; color: #188038; }
    .status-warn  { background: #fef7e0; color: #b06000; }

    .project-wrap {
      margin-bottom: 12px;
    }
    .project-wrap label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #5f6368;
      margin-bottom: 4px;
    }
    .project-wrap select {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #dadce0;
      font-size: 13px;
      font-family: inherit;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 9px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      border: none;
      text-align: center;
    }
    .btn-primary  { background: #1a73e8; color: white; }
    .btn-primary:hover { background: #1557b0; }
  </style>
</head>
<body>
  <div class="logo">💾</div>
  <h1>Save to Sheets</h1>
  <p class="subtitle">Select your active project</p>

  <div class="project-wrap" id="projectWrap" style="display:none">
    <label for="activeProject">Active Project:</label>
    <select id="activeProject"></select>
  </div>

  <div id="statusBox" class="status-row status-warn">⚙️ Loading...</div>

  <button class="btn btn-primary" id="openOptions">Manage Projects & Settings</button>

  <script src="popup.js"></script>
</body>
</html>
